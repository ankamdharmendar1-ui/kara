<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 44 44" fill="none" role="img" aria-label="CreditKarma.in">
  <defs>
    <linearGradient id="bg" x1="6" y1="4" x2="38" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2dd4bf"/>
      <stop offset="0.45" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#134e4a"/>
    </linearGradient>
    <linearGradient id="shine" x1="22" y1="6" x2="22" y2="22" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-5%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2.5" stdDeviation="2.2" flood-color="#0f766e" flood-opacity="0.4"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="2" y="2" width="40" height="40" rx="12" fill="url(#bg)"/>
    <rect x="2" y="2" width="40" height="40" rx="12" fill="url(#shine)"/>
    <rect x="3" y="3" width="38" height="38" rx="11" stroke="#fff" stroke-opacity="0.2" stroke-width="1.25"/>
  </g>

  <!-- Gold credit-score arc -->
  <path d="M33.5 29.5A11.5 11.5 0 0 0 22 17.5" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <circle cx="33.5" cy="29.5" r="2" fill="#fbbf24"/>

  <!-- C -->
  <path d="M18.8 28.8a6.4 6.4 0 1 1 0-12.8" stroke="#fff" stroke-width="2.75" stroke-linecap="round" fill="none"/>

  <!-- D -->
  <path d="M24.5 16h3.9a6.4 6.4 0 0 1 0 12.8h-3.9" stroke="#fff" stroke-width="2.75" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
